<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Un regalo de La Estación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --azul:#2E5A86; --azulo:#1E3F61; --tinta:#3a3a38; --crema:#f3efe7; --papel:#dedbd4; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Montserrat',system-ui,sans-serif; color:var(--tinta);
    background:linear-gradient(160deg,#2E5A86,#16273b); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:var(--crema); width:100%; max-width:420px; border-radius:24px;
    box-shadow:0 18px 50px rgba(15,30,50,.5); overflow:hidden; }
  .top { background:linear-gradient(135deg,#2E5A86,#1E3F61); color:#fff; text-align:center;
    padding:28px 22px 26px; }
  .marca { width:78px; height:78px; border-radius:50%; margin:0 auto 12px;
    background:radial-gradient(circle at 35% 30%, #2BC9DE, #B429C9 88%);
    display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,.3); }
  .marca b { font-family:'Montserrat'; font-weight:800; color:#fff; font-size:32px; letter-spacing:-1.5px; }
  .top .bar { font-size:12px; letter-spacing:3px; text-transform:uppercase; opacity:.85; }
  .top h1 { font-family:'Caveat',cursive; font-weight:700; font-size:40px; line-height:1; margin-top:2px; }
  .top .de { font-size:13.5px; opacity:.9; margin-top:6px; }
  .body { padding:24px 22px 8px; }
  .libre { text-align:center; padding:14px 0 4px; }
  .libre-ico { font-size:40px; }
  .libre-txt { font-family:'Caveat',cursive; font-size:34px; font-weight:700; color:var(--azul); margin-top:2px; }
  .libre-sub { font-size:13px; color:#6f6a60; margin-top:2px; }
  .productos { display:flex; flex-direction:column; gap:9px; }
  .item { display:flex; align-items:center; gap:10px; background:#fff; border:1px solid #e3ddcf;
    border-radius:12px; padding:11px 14px; }
  .item-q { font-weight:800; color:var(--azul); min-width:30px; }
  .item-n { font-size:15px; font-weight:500; }
  .dedic { margin:18px 6px 6px; font-family:'Caveat',cursive; font-size:22px; color:var(--azulo);
    text-align:center; line-height:1.25; }
  .dedic .firma { display:block; font-family:'Montserrat'; font-size:13px; font-weight:600;
    margin-top:6px; color:var(--tinta); opacity:.8; }
  .codigo { margin:20px 16px 6px; text-align:center; }
  .codigo .lbl { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#9a9382; }
  .codigo .val { font-family:'Montserrat'; font-size:26px; font-weight:800; letter-spacing:2px;
    color:var(--azulo); margin-top:4px; }
  .pie { text-align:center; padding:10px 22px 26px; color:#7d7567; font-size:12.5px; line-height:1.5; }
  .pie .marca-pie { color:var(--azul); font-weight:700; }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="marca"><b>LE</b></div>
      <div class="bar">La Estación</div>
      <h1>Un regalo para vos</h1>
      <div class="de">de parte de MARTIN</div>
    </div>
    <div class="body">
      
      <div class="libre">
        <div class="libre-ico">🍽️</div>
        <p class="libre-txt">Consumición libre</p>
        <p class="libre-sub">Disfrutá lo que quieras de nuestra carta</p>
      </div>
      <p class="dedic">"FELIZ CUMPLEAÑOS CLON"<span class="firma">— MARTIN</span></p>
      <div class="codigo">
        <div class="lbl">Código</div>
        <div class="val">LE-RKVM-PRJR</div>
      </div>
    </div>
    <div class="pie">
      Presentá este código en <span class="marca-pie">La Estación</span> para disfrutar tu regalo.<br>
      ¡Te esperamos!
    </div>
  </div>
</body>
</html>
